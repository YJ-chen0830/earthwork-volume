<style>

  body{margin:0;font-family:"Noto Sans TC","Segoe UI",sans-serif;background:var(--bg);color:var(--ink);}

    details.proc>pre{font-size:7pt!important;line-height:1.65!important;white-space:pre-wrap!important;padding:6pt 10pt 10pt!important;color:#1a1a1a!important;font-family:"Courier New",monospace!important;}
    .proj-section{border:1.5pt solid #0b1f3a!important;border-radius:4pt!important;}

</style>

<body data-tool="ew">
<header>
  <a href="https://yj-chen0830.github.io/engineering-hub/" style="color:var(--gold2);font-size:12.5px;text-decoration:none;display:inline-block;margin-bottom:8px;">← 返回工程計算中心</a>
  <h1>土方開挖回填計算</h1>
  <span>平均端面積法計算土方量 · 多測站累積方量</span>
</header>
<main>

<div class="proj-section no-print" id="projSection">
  <h3>📁 專案資訊（列印時帶入計算書封面）</h3>
  <div class="proj-grid">
    <div><label>工程名稱</label><input id="pj-name" placeholder="○○工程"></div>
    <div><label>工程地點</label><input id="pj-loc" placeholder="○○市○○區"></div>
    <div><label>承造廠商</label><input id="pj-contractor" placeholder="○○營造股份有限公司"></div>
    <div><label>文件編號</label><input id="pj-docno" placeholder="EW-CAL-001"></div>
    <div><label>計算者</label><input id="pj-calc" placeholder="姓名"></div>
    <div><label>審核者</label><input id="pj-review" placeholder="姓名"></div>
    <div><label>計算日期</label><input id="pj-date" type="date"></div>
  </div>
</div>

<div class="mob-tabs">
  <button class="mob-tab active" onclick="switchMobTab('ew-in',this)">📋 輸入參數</button>
  <button class="mob-tab" id="mobTab-ew-r" onclick="switchMobTab('ew-r',this)">📊 計算結果</button>
</div>
<div class="grid">
  <div class="card mob-active" data-tab="ew-in">
    <h2>測站資料輸入</h2>
    <div class="sec">平均端面積法（Average End Area Method）</div>
    <div id="ew-stations" class="station-list"></div>
    <button class="add-btn no-print" type="button" onclick="addStation()">+ 新增測站</button>
    <button class="calc-btn" type="button" onclick="calcEW()">計算土方開挖回填量</button>
    <div class="note">平均端面積法為工程估算常用簡化法，斷面積應由實測地形或設計斷面圖量取；地質不均勻、有機質土壤及壓實係數未納入本計算，正式數量計算應由測量及大地工程師複核。</div>
  </div>
  <div class="card" data-tab="ew-r">
    <h2>計算結果</h2>
    <div id="ew-diagram"></div>
    <div id="ew-result"><p style="color:#888">尚未計算</p></div>
    <details class="proc" id="ew-proc" style="display:none">
      <summary>📋 計算過程（供第三方檢核）</summary>
      <pre id="ew-proc-text"></pre>
    </details>
    <button class="pro-btn no-print" onclick="openPro()">📄 產出計算書 PDF</button>
  </div>
</div>

</main>
<script>
var ewStations = [
  {distance:0, cut:10, fill:0},
  {distance:20, cut:15, fill:2},
  {distance:25, cut:5, fill:8}
];

function switchMobTab(name,btn){
  btn.parentElement.querySelectorAll('.mob-tab').forEach(function(t){t.classList.remove('active');});
  btn.classList.add('active');
  btn.parentElement.nextElementSibling.querySelectorAll('.card').forEach(function(c){
    c.classList.toggle('mob-active',c.dataset.tab===name);
  });
}
function openPro(){ JRH.checkEmail(function(){ jrhPrint('土方開挖回填計算書'); }); }
function f1(x){return x.toFixed(1);}
function f2(x){return x.toFixed(2);}

function stationRowHtml(station,index){
  var isFirst=index===0;
  return ''+
    '<div class="station-row">'+
      '<div class="station-head">'+
        '<div class="station-title">測站'+(index+1)+'</div>'+
        '<button class="row-del no-print" type="button" onclick="deleteStation('+index+')" '+(ewStations.length<=2?'disabled':'')+'>刪除</button>'+
      '</div>'+
      '<div class="station-grid">'+
        '<div><label>測站距離 (m)</label><input type="number" step="0.01" value="'+station.distance+'" oninput="updateStation('+index+',\'distance\',this.value)"></div>'+
        '<div><label>開挖斷面積 (m²)</label><input type="number" step="0.01" value="'+station.cut+'" oninput="updateStation('+index+',\'cut\',this.value)"></div>'+
        '<div><label>回填斷面積 (m²)</label><input type="number" step="0.01" value="'+station.fill+'" oninput="updateStation('+index+',\'fill\',this.value)"></div>'+
      '</div>'+
      '<div class="station-tip">'+(isFirst?'首站距離欄位僅供記錄，計算時不使用。':'本列距離 L 代表前一測站至本測站之間距。')+'</div>'+
    '</div>';
}

function renderStations(){
  document.getElementById('ew-stations').innerHTML=ewStations.map(stationRowHtml).join('');
}

function parseNum(value){
  var n=parseFloat(value);
  return isNaN(n)?0:n;
}

function updateStation(index,key,value){
  ewStations[index][key]=parseNum(value);
}

function addStation(){
  var last=ewStations[ewStations.length-1]||{distance:0,cut:0,fill:0};
  ewStations.push({distance:last.distance||0,cut:0,fill:0});
  renderStations();
}

function deleteStation(index){
  if(ewStations.length<=2){return;}
  ewStations.splice(index,1);
  renderStations();
  calcEW();
}

function calcEarthwork(stations){
  var segments=[];
  var totalCut=0;
  var totalFill=0;
  for(var i=1;i<stations.length;i++){
    var prev=stations[i-1];
    var curr=stations[i];
    var L=parseNum(curr.distance);
    var cutVolume=L*(parseNum(prev.cut)+parseNum(curr.cut))/2;
    var fillVolume=L*(parseNum(prev.fill)+parseNum(curr.fill))/2;
    totalCut+=cutVolume;
    totalFill+=fillVolume;
    segments.push({
      label:'測站'+i+'→'+(i+1),
      distance:L,
      cutVolume:cutVolume,
      fillVolume:fillVolume,
      totalCut:totalCut,
      totalFill:totalFill,
      prevCut:parseNum(prev.cut),
      currCut:parseNum(curr.cut),
      prevFill:parseNum(prev.fill),
      currFill:parseNum(curr.fill)
    });
  }
  return {
    segments:segments,
    totalCut:totalCut,
    totalFill:totalFill,
    net:totalCut-totalFill
  };
}

function netLabel(net){
  if(net>0){return '淨開挖（需外運）';}
  if(net<0){return '淨回填（需借土）';}
  return '開挖回填平衡';
}

/* 縱剖面示意圖：開挖斷面積畫在基準線上方、回填斷面積畫在下方，各測站間以
   直線相連——與平均端面積法「相鄰測站斷面積平均」的假設一致，不是另外畫
   一條平滑曲線騙人好看。 */
function buildEWDiagram(stations,totalCut,totalFill,net){
  var W=460,H=280,padL=44,padR=20,padT=50,padB=34;
  var cumX=[0];
  for(var i=1;i<stations.length;i++){cumX.push(cumX[i-1]+parseNum(stations[i].distance));}
  var totalX=cumX[cumX.length-1]||1;
  var cuts=stations.map(function(s){return parseNum(s.cut);});
  var fills=stations.map(function(s){return parseNum(s.fill);});
  var maxCut=Math.max.apply(null,cuts.concat([1]));
  var maxFill=Math.max.apply(null,fills.concat([1]));
  var drawW=W-padL-padR, drawH=H-padT-padB;
  var scaleX=drawW/totalX;
  var scaleY=(drawH/2)/Math.max(maxCut,maxFill,1);
  var baseY=padT+drawH/2;
  function sx(x){return padL+x*scaleX;}
  function syCut(a){return baseY-a*scaleY;}
  function syFill(a){return baseY+a*scaleY;}

  var D=JRH.diagram, s='';
  s+=D.label(14,16,'測站斷面積縱剖面示意圖（依平均端面積法區間線性連接）',{anchor:'start',size:8,color:'#8a8370'});
  s+='<line x1="'+padL+'" y1="'+baseY+'" x2="'+(padL+drawW)+'" y2="'+baseY+'" stroke="#9a9382" stroke-width="1"/>';
  var cutPts=cumX.map(function(x,i){return sx(x)+','+syCut(cuts[i]);}).join(' ');
  s+='<polygon points="'+cutPts+' '+sx(totalX)+','+baseY+' '+sx(0)+','+baseY+'" fill="url(#jrhSoil)" stroke="#0b1f3a" stroke-width="1.4" opacity="0.9"/>';
  var fillPts=cumX.map(function(x,i){return sx(x)+','+syFill(fills[i]);}).join(' ');
  s+='<polygon points="'+fillPts+' '+sx(totalX)+','+baseY+' '+sx(0)+','+baseY+'" fill="#c9a14a" fill-opacity="0.35" stroke="#9a7b2a" stroke-width="1.4"/>';
  stations.forEach(function(st,i){
    var x=sx(cumX[i]);
    s+='<line x1="'+x+'" y1="'+(baseY-6)+'" x2="'+x+'" y2="'+(baseY+6)+'" stroke="#5c5442" stroke-width="1"/>';
    s+=D.label(x,baseY+20,'S'+(i+1),{size:7.5,color:'#5c5442'});
  });
  s+=D.label(padL,padT-10,'開挖 (m²)',{anchor:'start',size:8,color:'#0b1f3a',weight:'700'});
  s+=D.label(padL,H-8,'回填 (m²)',{anchor:'start',size:8,color:'#9a7b2a',weight:'700'});
  var netColor=net>=0?'#1a7d3a':'#c0392b';
  s+=D.label(W-10,16,(net>=0?'淨開挖 ':'淨回填 ')+Math.abs(net).toFixed(1)+' m³',{anchor:'end',size:9,color:netColor,weight:'700'});
  return D.wrap(W,H,s,{maxWidth:440});
}

function calcEW(){
  var calc=calcEarthwork(ewStations);
  if(ewStations.length<2){
    document.getElementById('ew-result').innerHTML='<p class="ng">至少需輸入 2 個測站。</p>';
    document.getElementById('ew-proc').style.display='none';
    document.getElementById('ew-diagram').innerHTML='';
    return calc;
  }

  if(window.JRH && JRH.diagram) document.getElementById('ew-diagram').innerHTML=buildEWDiagram(ewStations,calc.totalCut,calc.totalFill,calc.net);

  var rows=calc.segments.map(function(seg){
    return '<tr>'+
      '<td>'+seg.label+'</td>'+
      '<td class="num">'+f2(seg.distance)+'</td>'+
      '<td class="num">'+f2(seg.totalCut)+'</td>'+
      '<td class="num">'+f2(seg.totalFill)+'</td>'+
    '</tr>';
  }).join('');

  rows+='<tr>'+
    '<td><strong>合計</strong></td>'+
    '<td class="num">-</td>'+
    '<td class="num">'+f2(calc.totalCut)+'</td>'+
    '<td class="num">'+f2(calc.totalFill)+'</td>'+
  '</tr>';

  var netClass=calc.net>=0?'ok':'ng';
  var netText=(calc.net>=0?f2(calc.net):('-'+f2(Math.abs(calc.net))))+' m³';

  document.getElementById('ew-result').innerHTML=
    '<div class="summary-strip">'+
      '<div class="summary-box"><strong>總開挖量</strong><span>'+f2(calc.totalCut)+' m³</span><em>各區間開挖體積加總</em></div>'+
      '<div class="summary-box"><strong>總回填量</strong><span>'+f2(calc.totalFill)+' m³</span><em>各區間回填體積加總</em></div>'+
      '<div class="summary-box"><strong>淨方量</strong><span class="'+netClass+'">'+netText+'</span><em>'+netLabel(calc.net)+'</em></div>'+
    '</div>'+
    '<table>'+
      '<tr><th>區間</th><th>距離 L (m)</th><th>累積開挖量 (m³)</th><th>累積回填量 (m³)</th></tr>'+
      rows+
      '<tr><td colspan="4"><strong>淨方量：</strong><span class="'+netClass+'">'+netText+'，'+netLabel(calc.net)+'</span></td></tr>'+
    '</table>';

  var p='';
  p+='【土方開挖回填計算過程】\n\n';
  p+='一、計算方法\n';
  p+='  採用平均端面積法（Average End Area Method）。\n';
  p+='  各區間體積以相鄰兩測站斷面積平均值乘以測站距離計算。\n\n';
  p+='二、輸入測站資料\n';
  ewStations.forEach(function(st,index){
    p+='  測站'+(index+1)+'：距離 = '+f2(parseNum(st.distance))+' m，開挖斷面積 = '+f2(parseNum(st.cut))+' m²，回填斷面積 = '+f2(parseNum(st.fill))+' m²\n';
  });
  p+='\n三、逐區間計算\n';
  if(!calc.segments.length){
    p+='  測站不足，無法形成計算區間。\n';
  }else{
    calc.segments.forEach(function(seg){
      p+='  1. '+seg.label+'，距離 L = '+f2(seg.distance)+' m\n';
      p+='     開挖量 = L × (A₁ + A₂) / 2 = '+f2(seg.distance)+' × ('+f2(seg.prevCut)+' + '+f2(seg.currCut)+') / 2 = '+f2(seg.cutVolume)+' m³\n';
      p+='     回填量 = L × (B₁ + B₂) / 2 = '+f2(seg.distance)+' × ('+f2(seg.prevFill)+' + '+f2(seg.currFill)+') / 2 = '+f2(seg.fillVolume)+' m³\n';
      p+='     累積開挖量 = '+f2(seg.totalCut)+' m³；累積回填量 = '+f2(seg.totalFill)+' m³\n';
    });
  }
  p+='\n四、總量彙整\n';
  p+='  總開挖量 = '+f2(calc.totalCut)+' m³\n';
  p+='  總回填量 = '+f2(calc.totalFill)+' m³\n';
  p+='  淨方量 = 總開挖量 - 總回填量 = '+f2(calc.totalCut)+' - '+f2(calc.totalFill)+' = '+f2(calc.net)+' m³\n';
  p+='  判讀：'+netLabel(calc.net)+'\n';
  document.getElementById('ew-proc-text').textContent=p;
  document.getElementById('ew-proc').style.display='';
  if(window.innerWidth<768){var b=document.getElementById('mobTab-ew-r');if(b)switchMobTab('ew-r',b);}
  return calc;
}

  var dateInput=document.getElementById('pj-date');
  if(dateInput && !dateInput.value){dateInput.value=new Date().toISOString().slice(0,10);}
  renderStations();
  var calc=calcEW();
  console.log('Earthwork default computed values:',{
    totalCut:calc.totalCut,
    totalFill:calc.totalFill,
    net:calc.net
  });
});
